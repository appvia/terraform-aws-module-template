---
name: Workflow Validation
on:
  push:
    branches:
      - main
    paths:
      - ".github/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/**"

permissions:
  contents: read

jobs:
  validate-workflows:
    uses: appvia/appvia-cicd-workflows/.github/workflows/github-workflow-validation.yml@d356de2a6df8c4d482880e54a2a6255fdb2cf921 # main
    name: Validate GitHub Workflows
